services:
  app-dev:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./coderz-space:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    profiles:
      - dev

  app-prod:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    profiles:
      - prod
