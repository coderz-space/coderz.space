host: localhost:8080
info:
  contact:
    email: support@coderz.space
    name: API Support
  description: Comprehensive bootcamp management platform API with multi-tenant architecture
    and role-based access control
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Coderz.space Bootcamp Management API
  version: "1.0"
paths:
  /health:
    get:
      description: Check if the server is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /v1/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send password reset token (always returns success to prevent email
        enumeration)
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset email sent (if email exists)
          schema:
            $ref: '#/definitions/internal_modules_auth.GenericResponse'
        "400":
          description: Bad request - validation error
          schema:
            additionalProperties: true
            type: object
      summary: Request password reset
      tags:
      - Auth
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password to receive authentication tokens
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/internal_modules_auth.AuthResponse'
        "401":
          description: Unauthorized - invalid credentials
          schema:
            additionalProperties: true
            type: object
      summary: Authenticate user
      tags:
      - Auth
  /v1/auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset user password using a valid reset token
      parameters:
      - description: Reset token and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset successful
          schema:
            $ref: '#/definitions/internal_modules_auth.GenericResponse'
        "400":
          description: Bad request - validation error or invalid/expired token
          schema:
            additionalProperties: true
            type: object
      summary: Reset password with token
      tags:
      - Auth
  /v1/auth/signup:
    post:
