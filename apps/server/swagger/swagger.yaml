host: localhost:8080
info:
  contact:
    email: support@coderz.space
    name: API Support
  description: Comprehensive bootcamp management platform API with multi-tenant architecture
    and role-based access control
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Coderz.space Bootcamp Management API
  version: "1.0"
paths:
  /health:
    get:
      description: Check if the server is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /v1/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send password reset token (always returns success to prevent email
        enumeration)
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset email sent (if email exists)
          schema:
            $ref: '#/definitions/internal_modules_auth.GenericResponse'
        "400":
          description: Bad request - validation error
          schema:
            additionalProperties: true
            type: object
      summary: Request password reset
      tags:
      - Auth
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password to receive authentication tokens
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/internal_modules_auth.AuthResponse'
        "401":
          description: Unauthorized - invalid credentials
          schema:
            additionalProperties: true
            type: object
      summary: Authenticate user
      tags:
      - Auth
  /v1/auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset user password using a valid reset token
      parameters:
      - description: Reset token and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset successful
          schema:
            $ref: '#/definitions/internal_modules_auth.GenericResponse'
        "400":
          description: Bad request - validation error or invalid/expired token
          schema:
            additionalProperties: true
            type: object
      summary: Reset password with token
      tags:
      - Auth
  /v1/auth/signup:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: User registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User registered successfully
          schema:
            $ref: '#/definitions/internal_modules_auth.AuthResponse'
        "400":
          description: Bad request - validation error or email already exists
          schema:
            additionalProperties: true
            type: object
      summary: Register a new user
      tags:
      - Auth
  /v1/bootcamps/{bootcampId}/enrollments:
    get:
      consumes:
      - application/json
      description: Get all enrollments for a bootcamp
      parameters:
      - description: Bootcamp ID (UUID)
        in: path
        name: bootcampId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of enrollments
          schema:
            $ref: '#/definitions/internal_modules_bootcamp.EnrollmentListResponse'
        "400":
          description: Bad request - invalid bootcamp ID
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: List bootcamp enrollments
      tags:
      - Bootcamp Enrollments
  /v1/bootcamps/{bootcampId}/leaderboard:
    get:
      consumes:
      - application/json
      description: Retrieve pre-calculated leaderboard rankings for a bootcamp. Returns
        snapshot data without real-time recalculation. User must be enrolled in the
        bootcamp.
      parameters:
      - description: Bootcamp ID (UUID)
        in: path
        name: bootcampId
        required: true
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Leaderboard entries with pagination
          schema:
            $ref: '#/definitions/internal_modules_analytics.LeaderboardResponse'
        "400":
          description: Bad request - invalid bootcamp ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - not enrolled in bootcamp
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not found - bootcamp does not exist
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get bootcamp leaderboard
      tags:
      - Leaderboards
  /v1/bootcamps/{bootcampId}/leaderboard/{enrollmentId}:
    get:
      consumes:
      - application/json
      description: Retrieve a specific leaderboard entry by enrollment ID. Mentees
        can only view their own entry.
      parameters:
      - description: Bootcamp ID (UUID)
        in: path
        name: bootcampId
        required: true
        type: string
      - description: Bootcamp Enrollment ID (UUID)
        in: path
        name: enrollmentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Leaderboard entry details
          schema:
            $ref: '#/definitions/internal_modules_analytics.LeaderboardEntryResponse'
        "400":
          description: Bad request - invalid ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - access denied
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not found - entry does not exist
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get leaderboard entry
      tags:
      - Leaderboards
  /v1/bootcamps/{bootcampId}/polls:
    get:
      consumes:
      - application/json
      description: List polls for a bootcamp with optional problem filtering. Includes
        user's vote if they have voted. User must be enrolled in bootcamp.
      parameters:
      - description: Bootcamp ID (UUID)
        in: path
        name: bootcampId
        required: true
        type: string
      - description: Filter by problem ID (UUID)
        in: query
        name: problemId
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of polls with pagination
          schema:
            $ref: '#/definitions/internal_modules_analytics.PollListResponse'
        "400":
          description: Bad request - invalid bootcamp ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - not enrolled in bootcamp
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List polls
      tags:
      - Polls
    post:
      consumes:
      - application/json
      description: Create a difficulty poll for a problem in a bootcamp (mentor/admin
        only). Supports idempotency via Idempotency-Key header.
      parameters:
      - description: Bootcamp ID (UUID)
        in: path
        name: bootcampId
        required: true
        type: string
      - description: Poll details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_analytics.CreatePollRequest'
      - description: Idempotency key for safe retries
        in: header
        name: Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Poll created successfully
          schema:
            $ref: '#/definitions/internal_modules_analytics.PollResponse'
        "400":
          description: Bad request - validation error or invalid problem ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - mentor/admin role required
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not found - problem does not exist
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a poll
      tags:
      - Polls
  /v1/bootcamps/{bootcampId}/polls/{pollId}:
    get:
      consumes:
      - application/json
      description: Retrieve full details of a specific poll including user's vote
        state. User must be enrolled in bootcamp.
      parameters:
      - description: Bootcamp ID (UUID)
        in: path
        name: bootcampId
        required: true
        type: string
      - description: Poll ID (UUID)
        in: path
        name: pollId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Poll details
          schema:
            $ref: '#/definitions/internal_modules_analytics.PollResponse'
        "400":
          description: Bad request - invalid poll ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - not enrolled in bootcamp
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not found - poll does not exist
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get poll details
      tags:
      - Polls
  /v1/bootcamps/{bootcampId}/polls/{pollId}/results:
    get:
      consumes:
      - application/json
      description: Retrieve aggregated poll results with vote counts and percentages
        (mentor/admin/super_admin only). Mentees cannot access results.
      parameters:
      - description: Bootcamp ID (UUID)
        in: path
        name: bootcampId
        required: true
        type: string
      - description: Poll ID (UUID)
        in: path
        name: pollId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Aggregated poll results
          schema:
            $ref: '#/definitions/internal_modules_analytics.PollResultsResponse'
        "400":
          description: Bad request - invalid poll ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - mentor/admin/super_admin role required
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not found - poll does not exist
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get poll results
      tags:
      - Polls
  /v1/bootcamps/{bootcampId}/polls/{pollId}/vote:
    put:
      consumes:
      - application/json
      description: Cast or update a vote on a poll (mentee only). Uses PUT method
        for idempotent vote creation/update. Returns 201 for first vote, 200 for updates.
      parameters:
      - description: Bootcamp ID (UUID)
        in: path
        name: bootcampId
        required: true
        type: string
      - description: Poll ID (UUID)
        in: path
        name: pollId
        required: true
        type: string
      - description: Vote details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_analytics.VotePollRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Vote updated successfully
          schema:
            $ref: '#/definitions/internal_modules_analytics.VoteResponse'
        "201":
          description: Vote created successfully
          schema:
            $ref: '#/definitions/internal_modules_analytics.VoteResponse'
        "400":
          description: Bad request - validation error or invalid poll ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - only mentees can vote
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not found - poll does not exist
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Vote on a poll
      tags:
      - Polls
  /v1/bootcamps/{bootcampId}/polls/{pollId}/votes:
    get:
      consumes:
      - application/json
      description: Retrieve individual vote records with optional filtering by vote
        value (mentor/admin/super_admin only). Includes voter enrollment ID but not
        internal user identifiers.
      parameters:
      - description: Bootcamp ID (UUID)
        in: path
        name: bootcampId
        required: true
        type: string
      - description: Poll ID (UUID)
        in: path
        name: pollId
        required: true
        type: string
      - description: Filter by vote value (easy, medium, hard)
        in: query
        name: vote
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of individual votes with pagination
          schema:
            $ref: '#/definitions/internal_modules_analytics.PollVotesResponse'
        "400":
          description: Bad request - invalid poll ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - mentor/admin/super_admin role required
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not found - poll does not exist
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get individual poll votes
      tags:
      - Polls
  /v1/doubts:
    get:
      consumes:
      - application/json
      description: List doubts with filtering and cursor-based pagination. Mentees
        see only their own doubts, mentors/admins see all organization doubts.
      parameters:
      - description: Filter by bootcamp ID (UUID) - required for mentors/admins
        in: query
        name: bootcampId
        type: string
      - description: Filter by assignment problem ID (UUID)
        in: query
        name: assignmentProblemId
        type: string
      - description: Filter by resolved status
        in: query
        name: resolved
        type: boolean
      - description: Cursor for pagination
        in: query
        name: cursor
        type: string
      - description: 'Number of items per page (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of doubts with pagination
          schema:
            $ref: '#/definitions/internal_modules_progress.DoubtListResponse'
        "400":
          description: Bad request - invalid query parameters
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - insufficient permissions
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List doubts
      tags:
      - Doubts
    post:
      consumes:
      - application/json
      description: Create a doubt for an assignment problem (mentee only). Rate limited
        to prevent spam.
      parameters:
      - description: Doubt details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_progress.CreateDoubtRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Doubt created successfully
          schema:
