ignoreGeneratedHeader = false
severity = "warning"
confidence = 0.8
errorCode = 1
warningCode = 0

# Core rules - keep these enabled
[rule.blank-imports]
[rule.context-as-argument]
[rule.context-keys-type]
[rule.dot-imports]
[rule.error-return]
[rule.error-strings]
[rule.error-naming]
[rule.if-return]
[rule.increment-decrement]
[rule.var-naming]
[rule.var-declaration]
[rule.range]
[rule.receiver-naming]
[rule.time-naming]
[rule.indent-error-flow]
[rule.errorf]
[rule.empty-block]
[rule.superfluous-else]
[rule.unused-parameter]
[rule.unreachable-code]
[rule.redefines-builtin-id]

# Disabled rules - too noisy or not critical
# [rule.exported]  # Disabled: too many missing comments
# [rule.package-comments]  # Disabled: not critical for internal packages
# [rule.line-length-limit]  # Disabled: too restrictive
# [rule.function-length]  # Disabled: some complex functions are acceptable
# [rule.max-public-structs]  # Disabled: DTOs naturally have many structs
# [rule.cyclomatic]  # Disabled: some handlers have complex logic
# [rule.cognitive-complexity]  # Disabled: some business logic is inherently complex
# [rule.unexported-return]  # Disabled: internal packages can return unexported types
