version: "2"
sql:
  - engine: "postgresql"
    schema: "migration"
    queries: "query"
    gen:
      go:
        package: "db"
        out: "../internal/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
        emit_enum_valid_method: true