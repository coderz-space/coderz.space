services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: coderz-space-postgres
    environment:
      POSTGRES_USER: coderz-space
      POSTGRES_PASSWORD: coderz-space
      POSTGRES_DB: coderz
    ports:
      - "5432:5432"
    volumes:
      - coderz-postgres-data:/var/lib/postgresql/data
      - ./apps/server/db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coderz-space"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coderz-network

  # Database Migration
  migrate:
    image: migrate/migrate
    container_name: coderz-migrate
    volumes:
      - ./apps/server/db/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://coderz-space:coderz-space@postgres:5432/coderz?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - coderz-network

  # Backend API Server (Go)
  api:
    build:
      context: ./apps/server
      dockerfile: dockerfile
    container_name: coderz-api
    environment:
      PORT: 8080
      # For Docker, backend should allow web service as origin
      FRONTEND_ORIGIN: http://web:3000
      ENVIRONMENT: development
      # Use service name for DB connectivity within Docker network
      DB_URL: postgres://coderz-space:coderz-space@postgres:5432/coderz?sslmode=disable
      JWT_SECRET: j3QE2U6eBQj8EvRUnhPF2Sf2YuChgfhgfjhg0JMeSVWDNO138RYMj3QE2U6eBQj8EvRUnhPF2Sf2YuC0JMeSVWDNO138RYMj3QE2U6eBQj8EvRUnhPF2Sf2YuC0JMeSVWDNO138RYM
      JWT_EXPIRES: 1h
      REFRESH_TOKEN_EXPIRES: 24h
      LOG_LEVEL: info
      FILE_LOG_LEVEL: info
      APP_NAME: Coderz_Space
      VERSION: 0.1.0
      MAX_DB_CONNS: 10
      MIN_DB_CONNS: 2
      MAX_DB_CONN_LIFETIME: 1h
      MAX_DB_CONN_IDLE_TIME: 30m
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - coderz-network
    restart: unless-stopped

  # Frontend Web App (Next.js)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: coderz-web
    environment:
      # API client connects to backend service within Docker network
      NEXT_PUBLIC_API_URL: http://api:8080/api
      NEXT_PUBLIC_ENVIRONMENT: production
      NEXT_PUBLIC_ENABLE_ANALYTICS: "true"
      NEXT_PUBLIC_ENABLE_ERROR_REPORTING: "false"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - coderz-network
    restart: unless-stopped

volumes:
  coderz-postgres-data:

networks:
  coderz-network:
    driver: bridge
